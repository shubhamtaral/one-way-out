name: CI/CD - One Way Out

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['master']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: 🧪 CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔐 Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛡️ Security Audit
        run: npm audit --audit-level=high

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Unit Tests
        run: npm test

      - name: 🏗️ Build App
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: 🏗️ Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: 🏗️ Run Grype Scan (SARIF)
        run: |
          grype dir:. \
            --exclude node_modules \
            -o sarif > grype.sarif || true

      - name: 📤 Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype.sarif


  deploy_preview:
    name: 🌐 Preview Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ONE_WAY_OUT }}'

      - name: 🚀 Deploy Preview Channel
        run: |
          npx firebase-tools hosting:channel:deploy pr-${{ github.event.number }} \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --expires 7d


  deploy_production:
    name: 🚀 Production Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ONE_WAY_OUT }}'

      - name: 🚀 Deploy to Firebase (Production)
        run: |
          npx firebase-tools deploy \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --non-interactive --force