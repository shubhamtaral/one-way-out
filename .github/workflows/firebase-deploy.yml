name: CI/CD - One Way Out

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['master']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ci:
    name: 🧪 CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: 🔐 Secret Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git --redact --report-format sarif --report-path results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

  deploy_preview:
    name: 🌐 Preview Deploy
    runs-on: ubuntu-latest
    needs: ci

    # ✅ Prevent fork PR failures (no secrets access)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Validate Secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ONE_WAY_OUT }}" ]; then
            echo "❌ Firebase secret missing"
            exit 1
          fi

      - name: 🔐 Auth Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ONE_WAY_OUT }}'

      - name: 🚀 Deploy Preview
        id: preview
        run: |
          CHANNEL_ID=pr-${{ github.event.number }}

          URL=$(npx firebase-tools hosting:channel:deploy $CHANNEL_ID \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --expires 7d \
            --json | jq -r '.result[].url')

          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: 💬 Comment Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.preview.outputs.preview_url }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Ready!**
              
              🔗 ${url}
              
              _Deployed via Firebase Hosting Preview Channel_`
            });

  deploy_production:
    name: 🚀 Production Deploy
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Validate Secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ONE_WAY_OUT }}" ]; then
            echo "❌ Firebase secret missing"
            exit 1
          fi

      - name: 🔐 Auth Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ONE_WAY_OUT }}'

      - name: 🚀 Deploy Production
        run: |
          npx firebase-tools deploy \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --non-interactive --force